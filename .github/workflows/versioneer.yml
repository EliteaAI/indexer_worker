name: Auto-Increment Version

on:
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  call-reusable-workflow:
    uses: EliteaAI/actions/.github/workflows/versioneer.yml@main
    with:
      metadata_file: "metadata.json"
      version_key: ".version"
